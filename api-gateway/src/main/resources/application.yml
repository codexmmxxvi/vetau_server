spring:
  application:
    name: api-gateway
  profiles:
    active: ${APP_ENV:dev}
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  issuer: ${JWT_ISSUER:user-service}
