spring:
  application:
    name: ticket-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_ISSUER_URI:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWK_SET_URI:${AUTH_ISSUER_URI:http://localhost:8081}/.well-known/jwks.json}
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      database: 0
      sentinel:
        username: user
        password: 123456
  mongodb:
    representation:
      uuid: standard
    uri: "${TICKET_MONGODB_URI:mongodb://localhost:27017/ticket-service}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
server:
  port: ${SERVER_PORT:8086}


