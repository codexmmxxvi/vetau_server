spring:
  application:
    name: ticket-service
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      database: 0
      sentinel:
        username: user
        password: 123456
  mongodb:
    representation:
      uuid: standard
    uri: "${TICKET_MONGODB_URI:mongodb://localhost:27017/ticket-service}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
server:
  port: ${SERVER_PORT:8086}

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  issuer: ${JWT_ISSUER:user-service}


