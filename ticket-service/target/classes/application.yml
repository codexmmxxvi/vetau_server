spring:
  application:
    name: ticket-service
  data:
    mongodb:
      auto-index-creation: true
    redis:
      host: localhost
      port: 6379
      database: 0
      sentinel:
        username: user
        password: 123456
  mongodb:
    representation:
      uuid: standard
    uri: "${USER_MONGODB_URI:mongodb://localhost:27017/ticket-service}"

eureka:
  client:
    service-url:
      defaultZone: http://locahost:8761/eureka
server:
  port: 8082



