spring:
  application:
    name: user-service
  data:
    mongodb:
      auto-index-creation: true
  mongodb:
    representation:
      uuid: standard
    uri: "${USER_MONGODB_URI:mongodb://localhost:27017/user-service}"
eureka:
  client:
    service-url:
      defaultZone: http:localhost:8761/eureka

server:
  port: 8081


jwt:
  secret: "12345678901234567890123456789012"
  access-expiration: 900000
  refresh-expiration: 604800000
