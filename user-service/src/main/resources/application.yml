spring:
  application:
    name: user-service
  data:
    mongodb:
      auto-index-creation: true
  mongodb:
    representation:
      uuid: standard
    uri: "${USER_MONGODB_URI:mongodb://localhost:27017/user-service}"
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

server:
  port: ${SERVER_PORT:8081}


jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  issuer: ${JWT_ISSUER:user-service}
  access-expiration: 900000
  refresh-expiration: 604800000
