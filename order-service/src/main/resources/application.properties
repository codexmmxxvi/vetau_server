spring.application.name=order-service
server.port=${SERVER_PORT:8083}

spring.datasource.url=${ORDER_DB_URL:jdbc:mysql://localhost:3306/order_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${ORDER_DB_USERNAME:root}
spring.datasource.password=${ORDER_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

jwt.secret=${JWT_SECRET:12345678901234567890123456789012}
jwt.issuer=${JWT_ISSUER:user-service}
